services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - feedfuse_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    image: ghcr.io/bryanhoo/feedfuse-web:latest
    command:
      [
        'sh',
        '-lc',
        'node scripts/db/migrate.mjs && exec node server.js',
      ]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # 首次未在设置页修改密码前，登录会使用该初始密码校验
      AUTH_INITIAL_PASSWORD: ${AUTH_INITIAL_PASSWORD}
      IMAGE_PROXY_SECRET: ${IMAGE_PROXY_SECRET}
      RSS_NETWORK_MODE: ${RSS_NETWORK_MODE:-public}
      RSS_ALLOWED_CIDRS: ${RSS_ALLOWED_CIDRS:-}
      PORT: '9559'
      HOSTNAME: '0.0.0.0'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '${WEB_PORT:-9559}:9559'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:9559/api/health >/dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  worker:
    image: ghcr.io/bryanhoo/feedfuse-worker:latest
    command:
      [
        'sh',
        '-lc',
        'node scripts/db/migrate.mjs && exec node node_modules/tsx/dist/cli.mjs --tsconfig config/typescript/tsconfig.json src/worker/index.ts',
      ]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      RSS_NETWORK_MODE: ${RSS_NETWORK_MODE:-public}
      RSS_ALLOWED_CIDRS: ${RSS_ALLOWED_CIDRS:-}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  feedfuse_pg:
